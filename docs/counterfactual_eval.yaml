# Counterfactual evaluation config for AC-Video JEPA
# Kept under examples/ac_video_jepa/cfgs to align with other runnable example configs.

seed: 42
# Unified target: 200 scenarios per counterfactual task.
# do_location uses n_samples * 8 offsets => set n_samples=25.
n_samples: 25

do_location:
  t_intervene: [3, 5, 8, 10]
  loc_prime: "offset_multi"
  loc_prime_offsets_xy:
    - [-14, 0]
    - [14, 0]
    - [0, -14]
    - [0, 14]
    - [-12, -12]
    - [12, 12]
    - [-12, 12]
    - [12, -12]
  use_fact_wall_door: true
  action_source: "dataset"
  require_effectful: true
  min_oracle_effect_mse: 8.0
  require_oracle_pass_change: true
  target_effectful_n: 100
  max_attempts: 3000




do_door_y:
  wall_x: 32
  door_y_fact: 24
  door_y_cf: [12, 16, 20, 30, 36, 44, 52]
  action_source: "dataset"
  skip_same_value_eps: 1.0e-6
  require_effectful: true
  min_oracle_effect_mse: 2.0
  require_oracle_pass_change: true
  target_effectful_n: 100
  max_attempts: 3000


do_wall_x:
  wall_x_fact: 32
  wall_x_cf: [16, 20, 44, 48, 56]
  door_y: 24
  loc_0: null
  action_source: "dataset"
  skip_same_value_eps: 1.0e-6
  require_effectful: true
  min_oracle_effect_mse: 2.0
  require_oracle_pass_change: true
  target_effectful_n: 100
  max_attempts: 3000




do_door_y_wall_x:
  wall_x_fact: 32
  door_y_fact: 24
  wall_x_cf: [16, 20, 44, 48, 56]
  door_y_cf: [12, 16, 20, 30, 36, 44, 52]
  pair_sampling: "random_k"   # full_grid | random_k
  k_pairs_per_sample: 4
  skip_same_value_eps: 1.0e-6
  require_effectful: true
  min_oracle_effect_mse: 2.0
  require_oracle_pass_change: true
  target_effectful_n: 100
  max_attempts: 3000

dag_eval:
  n_intervention_groups: 50
  interventions:
    - { variable: "door_y", values: [16, 32, 48] }
    - { variable: "wall_x", values: [28, 36, 44] }
  true_dag_edges:
    - [wall_x, through_door]
    - [door_y, through_door]
    - [through_door, location_next]
    - [location, action, location_next]

env:
  wall_width: 3
  door_space: 4
  img_size: 96
  border_wall_loc: 1
